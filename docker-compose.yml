services:
  api:
    build:
      context: ./back
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "${PORT:-3333}:${PORT:-3333}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO /dev/null 'http://localhost:${PORT:-3333}/vehicles?page=1&pageSize=1' || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped
    networks:
      - app

  front:
    build:
      context: ./front
      dockerfile: Dockerfile
    environment:
      API_BACKEND_URL: http://api:${PORT:-3333}
      PORT: ${FRONT_PORT:-4000}
    ports:
      - "${FRONT_PORT:-4000}:${FRONT_PORT:-4000}"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-template_api}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-template_api}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app

volumes:
  postgres_data:
  redis_data:

networks:
  app:
    driver: bridge
