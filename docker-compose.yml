services:
  api:
    build:
      context: ./back
      dockerfile: Dockerfile
    # Compose loads `.env` from this directory for ${VAR} substitution below (works without a file if defaults suffice).
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3333}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-template_api}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/template_api?schema=public}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DB: ${REDIS_DB:-0}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
    ports:
      - "${PORT:-3333}:${PORT:-3333}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # TCP em 127.0.0.1:$PORT — não depende de HTTP/DB/Redis (portável em qualquer host Docker).
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "const p=Number(process.env.PORT||3333);const c=require(\"net\").createConnection(p,\"127.0.0.1\");c.on(\"connect\",()=>{c.end();process.exit(0)});c.on(\"error\",()=>process.exit(1));setTimeout(()=>process.exit(1),4000);"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - app

  front:
    build:
      context: ./front
      dockerfile: Dockerfile
    environment:
      API_BACKEND_URL: http://api:${PORT:-3333}
      PORT: ${FRONT_PORT:-4000}
    ports:
      - "${FRONT_PORT:-4000}:${FRONT_PORT:-4000}"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-template_api}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-template_api}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app

volumes:
  postgres_data:
  redis_data:

networks:
  app:
    driver: bridge
